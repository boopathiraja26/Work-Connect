<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Enhanced</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .dashboard-container {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }


        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #667eea;
        }

        .user-details h2 {
            margin: 0;
            color: #ffffff;
            font-size: 24px;
        }

        .user-details p {
            margin: 5px 0 0 0;
            color: #ffffff;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
        }

        .workers-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .section-header h2 {
            color: #333;
            margin: 0;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .filter-select {
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }

        .workers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .worker-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .worker-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .worker-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .worker-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .worker-info h3 {
            margin: 0;
            color: #ffffff;
            font-size: 18px;
        }

        .worker-info p {
            margin: 5px 0 0 0;
            color: #ffffff;
            font-size: 14px;
        }

        .worker-details {
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .detail-label {
            color: #fffbfb;
            font-weight: 500;
        }

        .detail-value {
            color: #667eea;
        }

        .location-link {
            color: #667eea;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .location-link:hover {
            text-decoration: underline;
        }

        .rating {
            color: #f39c12;
            font-weight: 600;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .hire-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            flex: 1;
            transition: all 0.3s ease;
        }

        .hire-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        .hire-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .details-btn {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .details-btn:hover {
            background: #5a6fd8;
        }

        .orders-sidebar {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .order-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .order-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .order-id {
            font-weight: 600;
            color: #ffffff;
        }

        .order-status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-accepted {
            background: #d4edda;
            color: #155724;
        }

        .status-completed {
            background: #cce5ff;
            color: #004085;
        }

        .order-summary {
            font-size: 14px;
            color: #666;
        }

        .order-summary div {
            margin-bottom: 5px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
        }

        .modal-body {
            padding: 25px;
        }

        .close {
            color: white;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            opacity: 0.7;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        /* Full Order View Modal */
        .full-order-modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .full-order-content {
            background-color: white;
            margin: 2% auto;
            padding: 0;
            border-radius: 15px;
            width: 95%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .full-order-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px 15px 0 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .full-order-body {
            padding: 30px;
        }

        .order-detail-section {
            margin-bottom: 30px;
        }

        .order-detail-section h3 {
            color: #ffffff;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .detail-item-full {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .detail-item-full .label {
            font-weight: 600;
            color: #ffffff;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .detail-item-full .value {
            color: #ffffff;
            font-size: 16px;
        }

        .worker-info-full {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .worker-avatar-full {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .worker-details-full h4 {
            margin: 0 0 10px 0;
            color: #ffffff;
        }

        .worker-details-full p {
            margin: 5px 0;
            color: #fffcfc;
        }

        .review-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .review-form {
            margin-top: 15px;
        }

        .rating-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .rating-input input[type="radio"] {
            display: none;
        }

        .rating-input label {
            cursor: pointer;
            font-size: 24px;
            color: #ddd;
        }

        .rating-input input[type="radio"]:checked~label {
            color: #f39c12;
        }

        .rating-input label:hover,
        .rating-input label:hover~label {
            color: #f39c12;
        }

        .no-orders {
            text-align: center;
            color: #ffffff;
            padding: 40px 20px;
        }

        .no-orders i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 15px;
        }

        @media (max-width: 992px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }

            .user-info {
                flex-direction: column;
                text-align: center;
            }

            .workers-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-container {
                padding: 10px;
            }

            .user-avatar {
                width: 80px;
                height: 80px;
            }

            .search-box {
                flex-direction: column;
            }

            .logout-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .worker-card {
                padding: 15px;
            }

            .action-buttons {
                flex-direction: column;
            }

            .detail-item {
                font-size: 13px;
            }
        }
    </style>
    <script src="config.js"></script>
</head>

<style>

<body>
    <!-- Navigation -->
    <nav
        style="background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid rgba(56, 189, 248, 0.2); backdrop-filter: blur(16px); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; margin-bottom: 0;">
        <div
            style="display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 0 20px;">
            <a href="customer-dashboard.html"
                style="font-weight: 700; font-size: 1.5rem; background: linear-gradient(135deg, #38bdf8, #3b82f6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none;">
                <i class="fas fa-tools me-2"></i>WorkConnect
            </a>

            <div style="display: flex; align-items: center; gap: 1.5rem;">

                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">Dashboard</a>
                <a href="customer-orders.html"
                    style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;"
                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">My Orders</a>
                <a href="customer-payments.html"
                    style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;"

                <a href="customer-help.html"
                    style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;"
                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">Help</a>

                <div class="nav-notifications">
                    <button type="button" id="customerNotifBtn"
                        style="background: none; border: none; color: #cbd5e1; position: relative; cursor: pointer; font-size: 1.1rem;">
                        <i class="fas fa-bell"></i>
                        <span id="customerNotifCount"
                            style="display: none; position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 5px; font-size: 0.65rem; font-weight: bold;">0</span>
                    </button>
                    <div id="customerNotifDropdown" class="notifications-dropdown">
                        <h6>Notifications</h6>
                        <div id="customerNotifList" style="max-height: 300px; overflow-y: auto;"></div>
                    </div>
                </div>

                <div>
                    <a href="customer-profile.html"
                        style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;"
                        onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">
                        <i class="fas fa-user-circle" style="font-size: 1.2rem;"></i>
                        <span id="navUserName">Profile</span>
                    </a>
                </div>

                <button class="btn btn-outline-danger btn-sm" onclick="logout()" style="border-radius: 8px;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <!-- Header -->
        <div class="header">
            <div class="user-info">
                <img id="userAvatar" src="https://placehold.co/100x100?text=Avatar" alt="User Avatar"
                    class="user-avatar">
                <div class="user-details">
                    <h2 id="userName" style="color: white;">Loading...</h2>

                    <p id="userLocation">Loading...</p>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Workers Section -->
            <div class="workers-section">
                <div class="section-header" style="color: white;">
                    <h2><i class="fas fa-users"></i> Available Workers</h2>
                </div>

                <div class="search-box">
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="Search workers by name, skills, or location...">
                    <select id="filterSelect" class="filter-select">
                        <option value="">All Skills</option>
                        <option value="Plumbing">Plumbing</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Cleaning">Cleaning</option>
                        <option value="Carpentry">Carpentry</option>
                        <option value="Painting">Painting</option>

                </div>

                <div id="workersGrid" class="workers-grid">

                </div>
            </div>

            <!-- Orders Sidebar -->
            <div class="orders-sidebar">
                <div class="section-header">
                    <h2><i class="fas fa-clipboard-list"></i> My Orders</h2>
                </div>

                <div id="ordersList">
                    <!-- Orders will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Hire Worker</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="orderForm">
                    <div class="form-group">
                        <label for="serviceType" style="color: #eee7e7;">Service Type</label>
                        <select id="serviceType" required>
                            <option value="">Select service type</option>
                            <option value="Plumbing">Plumbing</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Cleaning">Cleaning</option>
                            <option value="Carpentry">Carpentry</option>
                            <option value="Painting">Painting</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" rows="4" placeholder="Describe the work you need..."
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="duration">Duration (hours)</label>
                        <input type="number" id="duration" min="1" max="24" value="2" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Service Location</label>
                        <input type="text" id="serviceLocation" placeholder="Enter service location" required>
                    </div>
                    <button type="submit" class="submit-btn">Place Order</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Full Order View Modal -->
    <div id="fullOrderModal" class="full-order-modal">
        <div class="full-order-content">
            <div class="full-order-header">
                <h2 id="fullOrderTitle">Order Details</h2>
                <span class="close" onclick="closeFullOrderModal()">&times;</span>
            </div>
            <div class="full-order-body" id="fullOrderBody">
                <!-- Full order details will be loaded here -->
            </div>
        </div>
    </div>

    </div>

    <script>
        let currentUser = null;
        let selectedWorkerId = null;
        let workers = [];
        let orders = [];

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function () {
            loadUserInfo();
            loadWorkers();
            loadOrders();
            setupEventListeners();
            loadNotifications();
            initCustomerNotifToggle();
            setInterval(loadNotifications, 10000);
        });

        function loadUserInfo() {
            let user;
            try {
                const userStr = localStorage.getItem('user');
                user = userStr ? JSON.parse(userStr) : null;
            } catch (e) {
                user = null;
            }
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;

            document.getElementById('userName').textContent = user.name || user.username;
            document.getElementById('userEmail').textContent = user.email;

            if (user.location && user.location.link) {
                document.getElementById('userLocation').innerHTML =
                    `<i class="fas fa-map-marker-alt"></i> <a href="${user.location.link}" target="_blank" style="color: #667eea;">View My Location</a>`;
            } else {
                document.getElementById('userLocation').textContent = 'Location not set';
            }

            if (user.profileImage) {
                document.getElementById('userAvatar').src = user.profileImage;
            }

            // Update navbar profile name
            const navUserName = document.getElementById('navUserName');
            if (navUserName) {
                navUserName.textContent = (user.name || user.username).split(' ')[0];
            }
        }

        async function loadWorkers() {
            try {
                const response = await fetch(getApiUrl('/api/workers'));
                workers = await response.json();
                displayWorkers(workers);
            } catch (error) {
                console.error('Error loading workers:', error);
            }
        }

        function displayWorkers(workersToShow) {
            const grid = document.getElementById('workersGrid');

            if (workersToShow.length === 0) {
                grid.innerHTML = '<div class="no-orders"><i class="fas fa-users"></i><p>No workers available</p></div>';
                return;
            }

            grid.innerHTML = workersToShow.map(worker => `
                <div class="worker-card">
                    <div class="worker-header">
                        <img src="${worker.profileImage || 'https://placehold.co/100x100?text=Avatar'}" alt="${worker.name}" class="worker-avatar">
                        <div class="worker-info">
                            <h3>${worker.name || worker.username}</h3>
                            <p>${worker.skills ? worker.skills.join(', ') : 'No skills listed'}</p>
                        </div>
                    </div>
                    
                    <div class="worker-details">
                        <div class="detail-item">
                            <span class="detail-label">Experience:</span>
                            <span class="detail-value">${worker.experience || 'N/A'} years</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Rate:</span>
                            <span class="detail-value">$${worker.hourlyRate || 'N/A'}/hour</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Availability:</span>
                            <span class="detail-value">${worker.availability || 'Unknown'}</span>
                        </div>
                        ${worker.address ? `
                            <div class="detail-item">
                                <span class="detail-label">Address:</span>
                                <span class="detail-value">${worker.address.street || ''} ${worker.address.city || ''} ${worker.address.state || ''}</span>
                            </div>
                        ` : ''}
                        ${worker.location && worker.location.link ? `
                            <div class="detail-item">
                                <span class="detail-label">Location:</span>
                                <span class="detail-value">
                                    <a href="${worker.location.link}" target="_blank" class="location-link">
                                        <i class="fas fa-map-marker-alt"></i> View on Map
                                    </a>
                                </span>
                            </div>
                        ` : ''}
                        ${worker.averageRating ? `
                            <div class="detail-item">
                                <span class="detail-label">Rating:</span>
                                <span class="detail-value rating">⭐ ${worker.averageRating} (${worker.reviewsCount || 0} reviews)</span>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="action-buttons">
                        <button class="hire-btn"
                                onclick="openOrderModal('${worker.id}')"
                                ${worker.availability === 'Unavailable' ? 'disabled' : ''}>
                            ${worker.availability === 'Unavailable' ? 'Unavailable' : 'Hire Worker'}
                        </button>
                        <button class="details-btn" onclick="viewWorkerDetails('${worker.id}')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function loadOrders() {
            try {
                const response = await fetch(getApiUrl(`/api/orders/customer/${currentUser.id}`));
                orders = await response.json();
                displayOrders(orders);
            } catch (error) {
                console.error('Error loading orders:', error);
            }
        }

        function displayOrders(ordersToShow) {
            const ordersList = document.getElementById('ordersList');

            if (ordersToShow.length === 0) {
                ordersList.innerHTML = '<div class="no-orders"><i class="fas fa-clipboard-list"></i><p>No orders yet</p></div>';
                return;
            }

            ordersList.innerHTML = ordersToShow.map(order => {
                const paymentStatus = order.paymentStatus || 'unpaid';
                const canPay = paymentStatus !== 'paid' && (order.status === 'accepted' || order.status === 'completed');
                const paymentLine = `<div><strong>Payment:</strong> ${paymentStatus === 'paid' ? 'Paid' : 'Not paid'}${order.transactionId ? ` (Txn: ${order.transactionId})` : ''}</div>`;
                const payButton = canPay ? `
                    <button style="margin-top:8px;" class="submit-btn" onclick="event.stopPropagation(); window.location.href='payment.html?orderId=${order.id}';">
                        <i class="fas fa-credit-card"></i> Pay Now
                    </button>
                ` : '';
                return `
                    <div class="order-item" onclick="viewFullOrder('${order.id}')">
                        <div class="order-header">
                            <div class="order-id">Order #${order.id.slice(-6)}</div>
                            <span class="order-status status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                        </div>
                        <div class="order-summary">
                            <div><strong>Service:</strong> ${order.serviceType}</div>
                            <div><strong>Worker:</strong> ${order.worker ? order.worker.username : 'N/A'}</div>
                            <div><strong>Amount:</strong> $${order.totalAmount}</div>
                            <div><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</div>
                            ${paymentLine}
                        </div>
                        ${payButton}
                    </div>
                `;
            }).join('');
        }

        function setupEventListeners() {
            // Search functionality
            document.getElementById('searchInput').addEventListener('input', function () {
                filterWorkers();
            });

            document.getElementById('filterSelect').addEventListener('change', function () {
                filterWorkers();
            });

            // Order form
            document.getElementById('orderForm').addEventListener('submit', function (e) {
                e.preventDefault();
                submitOrder();
            });
        }

        function filterWorkers() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const skillFilter = document.getElementById('filterSelect').value;

            let filteredWorkers = workers.filter(worker => {
                const matchesSearch = !searchTerm ||
                    (worker.name && worker.name.toLowerCase().includes(searchTerm)) ||
                    (worker.username && worker.username.toLowerCase().includes(searchTerm)) ||
                    (worker.skills && worker.skills.some(skill => skill.toLowerCase().includes(searchTerm))) ||
                    (worker.address && `${worker.address.city} ${worker.address.state}`.toLowerCase().includes(searchTerm));

                const matchesSkill = !skillFilter ||
                    (worker.skills && worker.skills.includes(skillFilter));

                return matchesSearch && matchesSkill;
            });

            displayWorkers(filteredWorkers);
        }

        function openOrderModal(workerId) {
            selectedWorkerId = workerId;
            document.getElementById('orderModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
            document.getElementById('orderForm').reset();
            selectedWorkerId = null;
        }

        async function submitOrder() {
            const formData = {
                customerId: currentUser.id,
                workerId: selectedWorkerId,
                serviceType: document.getElementById('serviceType').value,
                description: document.getElementById('description').value,
                duration: parseInt(document.getElementById('duration').value),
                location: document.getElementById('serviceLocation').value
            };

            try {
                const response = await fetch(getApiUrl('/api/orders'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();
                if (response.ok) {
                    alert('Order placed successfully!');
                    closeModal();
                    loadOrders();
                } else {
                    alert(result.message || 'Error placing order');
                }
            } catch (error) {
                alert('Error placing order');
            }
        }

        function viewWorkerDetails(workerId) {
            window.location.href = `worker-details.html?id=${workerId}`;
        }

        async function viewFullOrder(orderId) {
            try {
                const response = await fetch(getApiUrl(`/api/order/${orderId}`));
                const order = await response.json();
                if (order.workerLiveLocation) {
                    const { latitude, longitude, timestamp } = order.workerLiveLocation;
                    const mapsUrl = `https://maps.google.com/?q=${latitude},${longitude}`;
                    console.log('[Customer] Initial worker live location', { orderId, latitude, longitude, mapsUrl, at: timestamp });
                } else {
                    console.log('[Customer] No live location yet for order', orderId);
                }

                document.getElementById('fullOrderTitle').textContent = `Order #${order.id.slice(-6)}`;

                const orderBody = document.getElementById('fullOrderBody');
                orderBody.innerHTML = `
                    <div class="order-detail-section">
                        <h3><i class="fas fa-info-circle"></i> Order Information</h3>
                        <div class="detail-grid">
                            <div class="detail-item-full">
                                <div class="label">Order ID</div>
                                <div class="value">#${order.id.slice(-6)}</div>
                            </div>
                            <div class="detail-item-full">
                                <div class="label">Status</div>
                                <div class="value">
                                    <span class="order-status status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                                </div>
                            </div>
                            <div class="detail-item-full">
                                <div class="label">Service Type</div>
                                <div class="value">${order.serviceType}</div>
                            </div>
                            <div class="detail-item-full">
                                <div class="label">Duration</div>
                                <div class="value">${order.duration} hours</div>
                            </div>
                            <div class="detail-item-full">
                                <div class="label">Total Amount</div>
                                <div class="value">$${order.totalAmount}</div>
                            </div>
                             <div class="detail-item-full">
                                <div class="label">Payment</div>
                                <div class="value">
                                    ${order.paymentStatus === 'paid' ?
                        '<span style="color: #28a745; font-weight: bold;"><i class="fas fa-check-circle"></i> Paid</span>' :
                        `<button class="btn btn-sm btn-success" onclick="window.location.href='payment.html?orderId=${order.id}'">Pay Now (₹${order.totalAmount})</button>`
                    }
                                    ${order.razorpayPaymentId ? `<br/><small>Txn ID: ${order.razorpayPaymentId}</small>` : ''}
                                </div>
                            </div>
                            <div class="detail-item-full">
                                <div class="label">Created Date</div>
                                <div class="value">${new Date(order.createdAt).toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="order-detail-section">
                        <h3><i class="fas fa-tools"></i> Service Details</h3>
                        <div class="detail-item-full">
                            <div class="label">Description</div>
                            <div class="value">${order.description}</div>
                        </div>
                        <div class="detail-item-full">
                            <div class="label">Service Location</div>
                            <div class="value">${order.location || 'Not specified'}</div>
                        </div>
                    </div>
                    
                    ${order.worker ? `
                        <div class="order-detail-section">
                            <h3><i class="fas fa-user"></i> Assigned Worker</h3>
                            <div class="worker-info-full">
                                <img src="${order.worker.profileImage || 'https://placehold.co/100x100?text=Avatar'}" alt="${order.worker.username}" class="worker-avatar-full">
                                <div class="worker-details-full">
                                    <h4>${order.worker.name || order.worker.username}</h4>
                                    <p><strong>Phone:</strong> ${order.worker.phone}</p>
                                    <p><strong>Email:</strong> ${order.worker.email}</p>
                                    <p><strong>Experience:</strong> ${order.worker.experience || 'N/A'} years</p>
                                    <p><strong>Hourly Rate:</strong> $${order.worker.hourlyRate || 'N/A'}</p>
                                    ${order.worker.location && order.worker.location.link ? `
                                        <p><strong>Location:</strong> <a href="${order.worker.location.link}" target="_blank" class="location-link">View on Map</a></p>
                                    ` : ''}
                                    ${order.workerLiveLocation ? `
                                        <p><strong>Live Location:</strong> <a href="https://maps.google.com/?q=${order.workerLiveLocation.latitude},${order.workerLiveLocation.longitude}" target="_blank" class="location-link">Open Live Position</a> <span style="color:#888;font-size:12px;">(updated ${new Date(order.workerLiveLocation.timestamp).toLocaleTimeString()})</span></p>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                        <div class="order-detail-section">
                            <h3><i class="fas fa-map-marked-alt"></i> Live Tracking Map</h3>
                            <div id="liveMap" style="height: 320px; border-radius: 12px; background: #f1f3f5;"></div>
                        </div>
                    ` : ''}
                    
                    ${order.status === 'completed' && !order.reviewed ? `
                        <div class="order-detail-section">
                            <h3><i class="fas fa-star"></i> Review & Rating</h3>
                            <div class="review-section">
                                <p>How was your experience with this worker?</p>
                                <form class="review-form" onsubmit="submitReview(event, '${order.id}', '${order.workerId}')">
                                    <div class="rating-input">
                                        <input type="radio" name="rating" value="5" id="star5" required>
                                        <label for="star5">★</label>
                                        <input type="radio" name="rating" value="4" id="star4">
                                        <label for="star4">★</label>
                                        <input type="radio" name="rating" value="3" id="star3">
                                        <label for="star3">★</label>
                                        <input type="radio" name="rating" value="2" id="star2">
                                        <label for="star2">★</label>
                                        <input type="radio" name="rating" value="1" id="star1">
                                        <label for="star1">★</label>
                                    </div>
                                    <div class="form-group">
                                        <label for="reviewComment">Comment (optional)</label>
                                        <textarea id="reviewComment" rows="3" placeholder="Share your experience..."></textarea>
                                    </div>
                                    <button type="submit" class="submit-btn">Submit Review</button>
                                </form>
                            </div>
                        </div>
                    ` : ''}
                    
                    ${order.reviewed ? `
                        <div class="order-detail-section">
                            <h3><i class="fas fa-star"></i> Your Review</h3>
                            <div class="detail-item-full">
                                <div class="label">Rating</div>
                                <div class="value">${'⭐'.repeat(order.review.rating)}</div>
                            </div>
                            ${order.review.comment ? `
                                <div class="detail-item-full">
                                    <div class="label">Comment</div>
                                    <div class="value">${order.review.comment}</div>
                                </div>
                            ` : ''}
                        </div>
                    ` : ''}
                `;

                document.getElementById('fullOrderModal').style.display = 'block';

                // Initialize map with current position if available
                if (order.workerLiveLocation && document.getElementById('liveMap')) {
                    renderLiveMap(order.workerLiveLocation.latitude, order.workerLiveLocation.longitude);
                }

                // Poll for live updates while the modal is open
                if (window.__livePoll) clearInterval(window.__livePoll);
                window.__livePoll = setInterval(async () => {
                    try {
                        const r = await fetch(getApiUrl(`/api/order/${orderId}`));
                        const o = await r.json();
                        if (o.workerLiveLocation) {
                            const { latitude, longitude, timestamp } = o.workerLiveLocation;
                            const mapsUrl = `https://maps.google.com/?q=${latitude},${longitude}`;
                            console.log('[Customer] Live update', { orderId, latitude, longitude, mapsUrl, at: timestamp });
                            if (document.getElementById('liveMap')) {
                                renderLiveMap(latitude, longitude);
                            }
                        }
                    } catch { }
                }, 10000);
            } catch (error) {
                console.error('Error loading order details:', error);
                alert('Error loading order details');
            }
        }

        function closeFullOrderModal() {
            document.getElementById('fullOrderModal').style.display = 'none';
            if (window.__livePoll) {
                clearInterval(window.__livePoll);
                window.__livePoll = null;
            }
        }

        // Live map helpers
        let __liveMapInstance = null;
        let __liveMapMarker = null;
        function renderLiveMap(lat, lng) {
            const mapEl = document.getElementById('liveMap');
            if (!mapEl) return;
            const position = [Number(lat), Number(lng)];
            if (!__liveMapInstance) {
                __liveMapInstance = L.map('liveMap').setView(position, 15);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
                }).addTo(__liveMapInstance);
            } else {
                __liveMapInstance.setView(position, 15);
            }
            if (!__liveMapMarker) {
                __liveMapMarker = L.marker(position).addTo(__liveMapInstance).bindPopup('Worker Location').openPopup();
            } else {
                __liveMapMarker.setLatLng(position);
            }
        }

        async function submitReview(event, orderId, workerId) {
            event.preventDefault();

            const rating = document.querySelector('input[name="rating"]:checked').value;
            const comment = document.getElementById('reviewComment').value;

            try {
                const response = await fetch(getApiUrl(`/api/worker/${workerId}/review`), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customerId: currentUser.id,
                        customerName: currentUser.username,
                        rating,
                        comment,
                        orderId
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    alert('Review submitted successfully!');
                    closeFullOrderModal();
                    loadOrders();
                } else {
                    alert(result.message || 'Error submitting review');
                }
            } catch (error) {
                alert('Error submitting review');
            }
        }

        async function payForOrder(orderId, amount) {
            // Redirect to dedicated payment page
            window.location.href = `payment.html?orderId=${orderId}`;
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }

        async function loadNotifications() {
            if (!currentUser) return;
            try {
                const res = await fetch(getApiUrl(`/api/notifications/${currentUser.id}`));
                if (res.ok) {
                    const notifications = await res.json();
                    renderNotifications(notifications);
                }
            } catch (e) {
                console.error('Error loading notifications', e);
            }
        }

        function renderNotifications(notifications) {
            const listEl = document.getElementById('customerNotifList');
            const countEl = document.getElementById('customerNotifCount');
            if (!listEl || !countEl) return;

            const unread = notifications.filter(n => !n.read);
            countEl.textContent = unread.length > 9 ? '9+' : unread.length;
            countEl.style.display = unread.length > 0 ? 'inline-block' : 'none';

            if (notifications.length === 0) {
                listEl.innerHTML = '<div style="padding: 12px; text-align: center; color: #9ca3af; font-size: 0.85rem;">No notifications</div>';
                return;
            }

            listEl.innerHTML = notifications.map(n => `
                <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markNotifAsRead('${n._id || n.id}', '${n.link}')">
                    <div class="notif-title" style="${n.read ? '' : 'font-weight:700;'}">${n.message}</div>
                    <div class="notif-meta">${new Date(n.createdAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                </div>
            `).join('');
        }

        async function markNotifAsRead(notifId, link) {
            try {
                await fetch(getApiUrl(`/api/notifications/${notifId}/read`), { method: 'PUT' });
                if (link && link !== 'null' && link !== 'undefined') {
                    window.location.href = link;
                } else {
                    loadNotifications();
                }
            } catch (e) {
                console.error('Error marking as read', e);
            }
        }

        function initCustomerNotifToggle() {
            const btn = document.getElementById('customerNotifBtn');
            const dropdown = document.getElementById('customerNotifDropdown');
            if (!btn || !dropdown) return;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });
            document.addEventListener('click', () => {
                dropdown.classList.remove('show');
            });
        }

        // Close modals when clicking outside
        window.onclick = function (event) {
            const orderModal = document.getElementById('orderModal');
            const fullOrderModal = document.getElementById('fullOrderModal');

            if (event.target === orderModal) {
                closeModal();
            }
            if (event.target === fullOrderModal) {
                closeFullOrderModal();
            }
        }
    </script>
