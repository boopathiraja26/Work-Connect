<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <!-- viewport meta for proper responsive scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>WorkConnect · Worker Orders (fully responsive)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #020617 100%);
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x: hidden;
    }

    /* custom scroll */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.5);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(56, 189, 248, 0.3);
      border-radius: 4px;
    }

    /* ---------- NAVBAR (fully responsive, same design) ---------- */
    .navbar {
      background: rgba(15, 23, 42, 0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
      padding: 0.75rem 0;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      width: 100%;
    }

    .navbar .container-fluid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-brand {
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .navbar-toggler {
      border: 1px solid rgba(148, 163, 184, 0.3);
      padding: 0.5rem;
      border-radius: 8px;
      background: transparent;
    }

    .navbar-toggler-icon {
      filter: invert(1);
      width: 1.3em;
      height: 1.3em;
    }

    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }

    .nav-link {
      color: #cbd5e1 !important;
      font-weight: 500;
      padding: 0.5rem 1rem !important;
      border-radius: 8px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.95rem;
      text-decoration: none;
    }

    .nav-link:hover,
    .nav-link.active {
      color: #fff !important;
      background: rgba(56, 189, 248, 0.1);
    }

    .nav-link.active {
      font-weight: 700;
    }

    /* notifications dropdown (mobile friendly) */
    .nav-notifications {
      position: relative;
    }

    #workerNotifBtn {
      background: none;
      border: none;
      color: #cbd5e1;
      padding: 0.5rem;
      border-radius: 8px;
    }

    #workerNotifBtn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .notifications-dropdown {
      position: absolute;
      top: 125%;
      right: 0;
      width: 300px;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 12px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.95);
      display: none;
      z-index: 1050;
      backdrop-filter: blur(16px);
    }

    .notifications-dropdown.show {
      display: block;
    }

    .notif-item {
      padding: 12px 1rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      cursor: pointer;
    }

    .notif-item.unread {
      background: rgba(56, 189, 248, 0.05);
      border-left: 3px solid #38bdf8;
    }

    .notif-title {
      color: #e5e7eb;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .notif-meta {
      color: #9ca3af;
      font-size: 0.7rem;
    }

    /* page header */
    .page-header {
      padding: 2.5rem 0 1.5rem;
      text-align: center;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #e5e7eb;
      margin-bottom: 0.5rem;
    }

    .page-subtitle {
      color: #9ca3af;
      font-size: 1rem;
    }

    /* search & filter container */
    .search-container {
      background: rgba(31, 41, 55, 0.4);
      border: 1px solid rgba(148, 163, 184, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 1.2rem;
    }

    .input-group {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 40px;
      overflow: hidden;
    }

    .input-group-text {
      background: transparent;
      border: none;
      color: #38bdf8;
    }

    .form-control,
    .form-select {
      background: transparent !important;
      border: none;
      color: white !important;
      padding: 0.75rem 1rem;
    }

    .form-control:focus,
    .form-select:focus {
      box-shadow: none;
      border-color: #38bdf8;
    }

    /* orders grid – fully responsive */
    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    /* order card (design exactly as before, only responsive padding) */
    .order-card {
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(30, 41, 59, 0.8));
      border-radius: 24px;
      border: 1px solid rgba(56, 189, 248, 0.15);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.5);
      padding: 1.5rem;
      transition: 0.3s;
      width: 100%;
      animation: fadeInUp 0.5s ease forwards;
      opacity: 0;
    }

    .order-card:hover {
      transform: translateY(-5px);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
    }

    .order-id {
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .order-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e5e7eb;
    }

    .order-status {
      padding: 0.4rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .status-pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .status-accepted {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .status-completed {
      background: rgba(59, 130, 246, 0.2);
      color: #7dd3fc;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .order-details {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0.4rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 100px;
    }

    .detail-value {
      color: #e5e7eb;
      font-weight: 500;
      text-align: right;
      word-break: break-word;
      flex: 1;
    }

    .customer-info {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1rem 0;
      padding: 0.75rem;
      background: rgba(15, 23, 42, 0.4);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.15);
      flex-wrap: wrap;
    }

    .customer-avatar {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
    }

    .customer-details {
      flex: 1;
    }

    .customer-name {
      font-weight: 600;
      color: #e5e7eb;
    }

    .customer-username {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .payment-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .payment-paid {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
    }

    .payment-pending {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }

    .card-footer-custom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }

    .amount-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.6rem 1.2rem;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 30px;
      color: #6ee7b7;
      font-weight: 700;
    }

    .action-buttons {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      white-space: nowrap;
    }

    .accept-btn {
      background: linear-gradient(135deg, #28a745, #218838);
      color: white;
    }

    .complete-btn {
      background: linear-gradient(135deg, #007bff, #0056b3);
      color: white;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #9ca3af;
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.5;
      color: #38bdf8;
    }

    /* loading spinner */
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 2rem auto;
      grid-column: 1 / -1;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeInUp {
      0% {
        opacity: 0;
        transform: translateY(15px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .order-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .order-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .order-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    /* ===== RESPONSIVE BREAKPOINTS (only layout, design intact) ===== */

    /* tablet landscape & medium screens */
    @media (max-width: 1024px) {
      .orders-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* mobile & small tablets */
    @media (max-width: 768px) {
      .navbar-collapse {
        background: rgba(15, 23, 42, 0.98);
        backdrop-filter: blur(24px);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 1rem;
        padding: 1rem;
        margin-top: 1rem;
      }

      .navbar-nav {
        gap: 0.5rem;
        align-items: flex-start;
      }

      .nav-link {
        width: 100%;
        padding: 0.75rem 1rem !important;
      }

      .nav-item {
        width: 100%;
      }

      .nav-notifications {
        width: 100%;
      }

      #workerNotifBtn {
        width: 100%;
        text-align: left;
        padding: 0.75rem 1rem;
      }

      .notifications-dropdown {
        position: static;
        width: 100%;
        margin-top: 0.5rem;
      }

      .orders-grid {
        grid-template-columns: 1fr;
        max-width: 550px;
        margin-left: auto;
        margin-right: auto;
      }

      .page-title {
        font-size: 2rem;
      }

      .search-container {
        padding: 1rem;
      }

      .row.g-2>.col-md-8,
      .row.g-2>.col-md-4 {
        width: 100%;
      }
    }

    /* narrow mobile */
    @media (max-width: 576px) {
      .navbar-brand {
        font-size: 1.3rem;
      }

      .container-fluid {
        padding: 0 16px;
      }

      .order-card {
        padding: 1.2rem;
      }

      .detail-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.2rem;
      }

      .detail-label {
        min-width: auto;
      }

      .card-footer-custom {
        flex-direction: column;
        align-items: stretch;
      }

      .amount-badge {
        justify-content: center;
        width: 100%;
      }

      .action-buttons {
        width: 100%;
      }

      .action-btn {
        width: 100%;
        justify-content: center;
      }

      .customer-info {
        flex-wrap: wrap;
      }
    }

    /* extra small */
    @media (max-width: 400px) {
      .order-header {
        flex-direction: column;
        align-items: flex-start;
      }

      .order-status {
        align-self: flex-start;
      }
    }

    /* large desktop (above 1400) */
    @media (min-width: 1400px) {
      .orders-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
    <script src="config.js"></script>
</head>

<body>
  <!-- NAVBAR (full width, responsive) -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="worker-profile.html"><i class="fas fa-tools me-2"></i>WorkConnect</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"><i class="fas fa-bars text-white"></i></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a href="worker-profile.html" class="nav-link">Profile</a></li>
          <li class="nav-item"><a href="worker-orders.html" class="nav-link active">My Orders</a></li>
          <li class="nav-item"><a href="worker-payments.html" class="nav-link">Payments</a></li>
          <li class="nav-item"><a href="worker-help.html" class="nav-link">Help</a></li>
          <!-- notifications -->
          <li class="nav-item ms-lg-3">
            <div class="nav-notifications">
              <button type="button" id="workerNotifBtn" class="btn btn-link nav-link p-0 border-0">
                <i class="fas fa-bell"></i>
                <span id="workerNotifCount"
                  style="display:none; position:absolute; top:-2px; right:-2px; background:#ef4444; color:white; border-radius:50%; padding:2px 5px; font-size:0.65rem;">0</span>
              </button>
              <div id="workerNotifDropdown" class="notifications-dropdown">
                <h6
                  style="padding:0.5rem 1rem; border-bottom:1px solid rgba(148,163,184,0.2); color:#94a3b8; font-size:0.85rem; margin:0;">
                  Notifications</h6>
                <div id="workerNotifList" style="max-height:300px; overflow-y:auto;"></div>
              </div>
            </div>
          </li>
          <li class="nav-item ms-lg-2">
            <a href="worker-profile.html" class="nav-link d-flex align-items-center gap-2">
              <i class="fas fa-user-circle" style="font-size:1.2rem; color:#38bdf8;"></i>
              <span id="navWorkerName">Worker</span>
            </a>
          </li>
          <li class="nav-item ms-lg-2">
            <button class="btn btn-outline-danger btn-sm" onclick="logout()"
              style="border-radius:8px; padding:0.4rem 0.8rem;">
              <i class="fas fa-power-off"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- MAIN CONTENT (fully responsive) -->
  <div class="container py-4">
    <header class="page-header">
      <h1 class="page-title">My Orders</h1>
      <p class="page-subtitle">View and manage all orders assigned to you</p>

      <!-- search & filter -->
      <div class="row justify-content-center mt-4">
        <div class="col-12 col-lg-10 col-xl-8">
          <div class="search-container">
            <div class="row g-2">
              <div class="col-md-8">
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-search"></i></span>
                  <input type="text" id="orderSearch" class="form-control" placeholder="Search orders or customers...">
                </div>
              </div>
              <div class="col-md-4">
                <select id="statusFilter" class="form-select">
                  <option value="all" style="background:#1f2937;">All Status</option>
                  <option value="pending" style="background:#1f2937;">Pending</option>
                  <option value="accepted" style="background:#1f2937;">Accepted</option>
                  <option value="completed" style="background:#1f2937;">Completed</option>
                </select>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- orders grid -->
    <div class="orders-grid" id="ordersList"></div>
    <div class="loading-spinner" id="loadingSpinner"></div>
    <div id="emptyState" class="empty-state" style="display: none;">
      <div class="empty-icon"><i class="fas fa-clipboard-list"></i></div>
      <h4>No Orders Found</h4>
      <p>You don't have any orders assigned yet.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    (function () {
      let currentUser = null;
      let allOrders = [];

      try {
        const u = localStorage.getItem('user');
        if (u) currentUser = JSON.parse(u);
      } catch (e) { }
      if (!currentUser || currentUser.role !== 'worker') {
        window.location.href = 'login.html';
        return;
      }

      document.getElementById('navWorkerName').innerText = (currentUser.name || currentUser.username || 'Worker').split(' ')[0];

      // event listeners
      document.getElementById('orderSearch').addEventListener('input', filterOrders);
      document.getElementById('statusFilter').addEventListener('change', filterOrders);

      loadOrders();
      loadNotifications();
      setInterval(loadNotifications, 15000);
      initNotifToggle();

      async function loadOrders() {
        const spinner = document.getElementById('loadingSpinner');
        spinner.style.display = 'block';
        try {
          const res = await fetch(getApiUrl(`/api/orders/${currentUser.id}`));
          if (!res.ok) throw new Error();
          const orders = await res.json() || [];
          allOrders = orders.filter(o => o.workerId === currentUser.id).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          filterOrders();
        } catch (err) {
          document.getElementById('ordersList').innerHTML = `
            <div class="empty-state" style="grid-column:1/-1;">
              <div class="empty-icon"><i class="fas fa-exclamation-triangle"></i></div>
              <h4>Error Loading Orders</h4>
              <button class="action-btn complete-btn mt-3" onclick="location.reload()">Retry</button>
            </div>`;
        } finally {
          spinner.style.display = 'none';
        }
      }

      function filterOrders() {
        const search = document.getElementById('orderSearch').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;

        const filtered = allOrders.filter(o => {
          const customerName = (o.customer?.name || o.customer?.username || '').toLowerCase();
          const service = (o.serviceType || '').toLowerCase();
          const idMatch = o.id.toLowerCase().includes(search);
          return (customerName.includes(search) || service.includes(search) || idMatch) && (status === 'all' || o.status === status);
        });
        displayOrders(filtered);
      }

      function displayOrders(orders) {
        const list = document.getElementById('ordersList');
        const empty = document.getElementById('emptyState');
        if (!orders.length) {
          list.innerHTML = '';
          empty.style.display = 'block';
          return;
        }
        empty.style.display = 'none';
        list.innerHTML = orders.map(o => {
          const c = o.customer || {};
          const initial = (c.name || c.username || 'C').charAt(0).toUpperCase();
          return `
          <div class="order-card">
            <div class="order-header">
              <div><div class="order-id">ORDER #${o.id.slice(-8).toUpperCase()}</div>
              <div class="order-title">${o.serviceType}</div></div>
              <span class="order-status status-${o.status}"><i class="fas ${o.status === 'pending' ? 'fa-clock' : o.status === 'accepted' ? 'fa-check-circle' : 'fa-flag-checkered'}"></i> ${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span>
            </div>
            <div class="order-details">
              <div class="detail-row"><span class="detail-label"><i class="fas fa-file-alt"></i> Description</span><span class="detail-value">${o.description}</span></div>
              <div class="detail-row"><span class="detail-label"><i class="fas fa-clock"></i> Duration</span><span class="detail-value">${o.duration} hours</span></div>
              <div class="detail-row"><span class="detail-label"><i class="fas fa-calendar"></i> Date</span><span class="detail-value">${new Date(o.createdAt).toLocaleDateString()}</span></div>
              <div class="detail-row"><span class="detail-label"><i class="fas fa-credit-card"></i> Payment</span><span class="payment-status payment-${o.paymentStatus}"><i class="fas ${o.paymentStatus === 'paid' ? 'fa-check-circle' : 'fa-clock'}"></i> ${o.paymentStatus === 'paid' ? 'Paid' : 'Pending'}</span></div>
              ${c.address?.street ? `
              <div class="detail-row">
                <span class="detail-label"><i class="fas fa-map-marker-alt"></i> Address</span>
                <span class="detail-value">
                  <a href="${c.location?.link || (c.location?.latitude && c.location?.longitude ? `https://www.google.com/maps?q=${c.location.latitude},${c.location.longitude}` : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address.street + (c.address.city ? ', ' + c.address.city : '') + (c.address.state ? ', ' + c.address.state : ''))}`)}" 
                     target="_blank" style="color: #38bdf8; text-decoration: none; cursor: pointer;" title="Open in Map">
                    ${c.address.street}, ${c.address.city || ''} <i class="fas fa-external-link-alt ms-1" style="font-size: 0.7rem;"></i>
                  </a>
                </span>
              </div>` : ''}
            </div>
            <div class="customer-info">
              <div class="customer-avatar">${initial}</div>
              <div class="customer-details"><div class="customer-name">${c.name || c.username || 'Customer'}</div><div class="customer-username">${c.username ? '@' + c.username : ''}</div></div>
            </div>
            <div class="card-footer-custom">
              <div class="amount-badge"><i class="fas fa-rupee-sign"></i> ${o.totalAmount}</div>
              <div class="action-buttons">
                ${o.status === 'pending' ? `<button class="action-btn accept-btn" onclick="updateOrderStatus('${o.id}','accepted')"><i class="fas fa-check"></i> Accept</button>` : ''}
                ${o.status === 'accepted' ? `<button class="action-btn complete-btn" onclick="updateOrderStatus('${o.id}','completed')"><i class="fas fa-check-double"></i> Complete</button>` : ''}
              </div>
            </div>
          </div>`;
        }).join('');
      }

      window.updateOrderStatus = async (id, status) => {
        if (!confirm(`Mark order as ${status}?`)) return;
        const btn = event?.target.closest('button');
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
        try {
          const res = await fetch(getApiUrl(`/api/orders/${id}`), { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
          if (res.ok) { if (status === 'accepted') startSharingLocation(id); loadOrders(); }
          else alert('Error');
        } catch (e) { alert('Network error'); }
        finally { if (btn) btn.disabled = false; }
      };

      async function startSharingLocation(orderId) {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(async (pos) => {
          try { await fetch(getApiUrl(`/api/orders/${orderId}/worker-location`), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }) }); } catch (e) { }
        }, () => { });
      }

      async function loadNotifications() {
        if (!currentUser) return;
        try {
          const res = await fetch(getApiUrl(`/api/notifications/${currentUser.id}`));
          if (res.ok) {
            const notifs = await res.json();
            renderNotifications(notifs);
          }
        } catch (e) { }
      }

      function renderNotifications(notifs) {
        const list = document.getElementById('workerNotifList');
        const count = document.getElementById('workerNotifCount');
        if (!list || !count) return;
        const unread = notifs.filter(n => !n.read);
        count.innerText = unread.length > 9 ? '9+' : unread.length;
        count.style.display = unread.length ? 'inline-block' : 'none';
        if (!notifs.length) { list.innerHTML = '<div class="p-3 text-center text-muted small">No notifications</div>'; return; }
        list.innerHTML = notifs.map(n => `<div class="notif-item ${n.read ? '' : 'unread'}" onclick="markAsRead('${n._id || n.id}','${n.link || ''}')"><div class="notif-title">${n.message || ''}</div><div class="notif-meta">${new Date(n.createdAt).toLocaleString()}</div></div>`).join('');
      }

      window.markAsRead = async (id, link) => {
        try { await fetch(getApiUrl(`/api/notifications/${id}/read`), { method: 'PUT' }); } catch (e) { }
        if (link && link !== 'null') window.location.href = link;
        else loadNotifications();
      };

      function initNotifToggle() {
        const btn = document.getElementById('workerNotifBtn');
        const drop = document.getElementById('workerNotifDropdown');
        if (btn) btn.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); drop.classList.toggle('show'); });
        document.addEventListener('click', () => drop.classList.remove('show'));
      }
    })();

    function logout() { localStorage.removeItem('user'); window.location.href = 'login.html'; }
  </script>
</body>

</html>
