<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkConnect - Worker Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #020617 100%);
            color: #e5e7eb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            backdrop-filter: blur(16px);
        }
        .navbar-brand {
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .navbar .nav-link {
            color: #9ca3af;
        }
        .navbar .nav-link:hover,
        .navbar .nav-link.active {
            color: #e5e7eb;
        }
        .page-header {
            padding: 2.5rem 0 1.5rem;
        }
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
        }
        .page-subtitle {
            color: #9ca3af;
        }
        .orders-section {
            background: radial-gradient(circle at top left, rgba(56,189,248,0.12), transparent 55%),
                        radial-gradient(circle at bottom right, rgba(96,165,250,0.12), transparent 55%),
                        rgba(15,23,42,0.9);
            border-radius: 1.25rem;
            border: 1px solid rgba(148,163,184,0.3);
            box-shadow: 0 24px 60px rgba(15,23,42,0.8);
            padding: 25px;
            margin-bottom: 30px;
        }
        .order-item {
            background: rgba(31,41,55,0.6);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #38bdf8;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .order-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-accepted { background: #d4edda; color: #155724; }
        .status-completed { background: #cce5ff; color: #004085; }
        .order-details { color: #9ca3af; font-size: 14px; }
        .order-details strong { color: #e5e7eb; }
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .accept-btn { background: #28a745; color: white; }
        .complete-btn { background: #007bff; color: white; }
        .accept-btn:hover { background: #218838; }
        .complete-btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="worker-profile.html">
                <i class="fas fa-tools me-2"></i>WorkConnect
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="worker-profile.html" id="navUserLink">Profile</a>
                <a class="nav-link active" href="worker-orders.html">Orders</a>
                <a class="nav-link" href="worker-payments.html">Payments</a>
                <button class="btn btn-outline-light btn-sm ms-3" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <header class="page-header">
            <h1 class="page-title">My Orders</h1>
            <p class="page-subtitle">View and manage all orders assigned to you.</p>
        </header>

        <section class="orders-section">
            <h2 style="border:0;padding-bottom:0;margin-bottom:15px;">Orders</h2>
            <div id="ordersList"></div>
        </section>
    </div>

    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', () => {
            try {
                const userStr = localStorage.getItem('user');
                currentUser = userStr ? JSON.parse(userStr) : null;
            } catch {
                currentUser = null;
            }

            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.role !== 'worker') {
                window.location.href = 'dashboard.html';
                return;
            }

            const navUserLink = document.getElementById('navUserLink');
            if (navUserLink) {
                navUserLink.textContent = (currentUser.name || currentUser.username) + ' (Profile)';
            }

            loadOrders();
        });

        async function loadOrders() {
            try {
                const response = await fetch(`/api/orders/${currentUser.id}`);
                if (!response.ok) return;
                const orders = await response.json() || [];
                const workerOrders = orders.filter(o => o.workerId === currentUser.id);
                displayOrders(workerOrders);
            } catch (err) {
                console.error('Error loading worker orders page:', err);
            }
        }

        function displayOrders(orders) {
            const list = document.getElementById('ordersList');
            if (!orders || orders.length === 0) {
                list.innerHTML = '<p class="text-center text-secondary mb-0">No orders yet.</p>';
                return;
            }
            list.innerHTML = orders.map(order => {
                const customer = order.customer || {};
                return `
                    <div class="order-item">
                        <div class="order-header">
                            <div>
                                <strong>Order #${order.id.slice(-6)}</strong>
                                <div class="order-details">Service: ${order.serviceType}</div>
                            </div>
                            <span class="order-status status-${order.status}">${order.status.charAt(0).toUpperCase() + order.status.slice(1)}</span>
                        </div>
                        <div class="order-details">
                            <div><strong>Description:</strong> ${order.description}</div>
                            <div><strong>Duration:</strong> ${order.duration} hours</div>
                            <div><strong>Amount:</strong> ₹${order.totalAmount}</div>
                            <div><strong>Customer:</strong> ${customer.username || ''}</div>
                            <div><strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}</div>
                            <div><strong>Payment:</strong> ${order.paymentStatus === 'paid' ? 'Paid' : 'Not paid'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
