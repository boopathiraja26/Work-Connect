<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkConnect - Help Center</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* ── Base ── */
        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, #020617 0%, #020617 45%, #020617 100%);
            color: #e5e7eb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        /* ── Navbar – exact copy from customer-dashboard ── */
        .navbar {
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .navbar .nav-link {
            position: relative;
            color: #9ca3af;
            padding-bottom: 0.25rem;
            margin: 0 0.35rem;
            transition: color 0.2s ease;
        }

        .navbar .nav-link::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, #38bdf8, #60a5fa);
            transform: scaleX(0);
            transform-origin: center;
            transition: transform 0.2s ease-out;
        }

        .navbar .nav-link:hover {
            color: #e5e7eb;
        }

        .navbar .nav-link:hover::after {
            transform: scaleX(1);
        }

        .nav-notifications {
            position: relative;
            margin-right: 0.5rem;
        }

        .nav-notifications button {
            background: transparent;
            border: none;
            color: #9ca3af;
            position: relative;
        }

        .nav-notifications button:hover {
            color: #e5e7eb;
        }

        .nav-notifications .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: #ffffff;
            border-radius: 999px;
            font-size: 10px;
            padding: 0 4px;
        }

        .notifications-dropdown {
            position: absolute;
            right: 0;
            top: 125%;
            width: 280px;
            background: rgba(15, 23, 42, 0.98);
            border-radius: 0.75rem;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.95);
            padding: 0.5rem 0;
            display: none;
            z-index: 30;
        }

        .notifications-dropdown.show {
            display: block;
        }

        .notifications-dropdown h6 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.4rem 0.9rem;
            margin-bottom: 0.25rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.3);
            color: #9ca3af;
        }

        .notifications-dropdown .notif-item {
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
            border-bottom: 1px solid rgba(30, 41, 59, 0.9);
            cursor: pointer;
            transition: background 0.2s;
        }

        .notifications-dropdown .notif-item:last-child {
            border-bottom: none;
        }

        .notifications-dropdown .notif-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .notifications-dropdown .notif-item.unread {
            background: rgba(56, 189, 248, 0.05);
            border-left: 3px solid #38bdf8;
        }

        .notifications-dropdown .notif-title {
            font-weight: 600;
            color: #e5e7eb;
        }

        .notifications-dropdown .notif-meta {
            color: #9ca3af;
            font-size: 0.72rem;
        }

        /* ── Page content ── */
        .page-header {
            padding: 2.5rem 0 1.5rem;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f8fafc, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.4rem;
        }

        .page-subtitle {
            color: #94a3b8;
            font-size: 1rem;
        }

        .section-label {
            background: linear-gradient(135deg, #38bdf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }

        /* Glass cards */
        .glass-card {
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.10), transparent 55%),
                radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.10), transparent 55%),
                rgba(15, 23, 42, 0.9);
            border-radius: 1.25rem;
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.85);
            padding: 1.75rem;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .glass-card:hover {
            border-color: rgba(56, 189, 248, 0.45);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.95);
        }

        .glass-card h3 {
            color: #e5e7eb;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
        }

        /* Form */
        .form-label {
            color: #cbd5e1;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .form-control,
        .form-select {
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #e5e7eb;
            border-radius: 0.75rem;
            padding: 0.6rem 0.9rem;
        }

        .form-control::placeholder {
            color: #6b7280;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.95);
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            color: #e5e7eb;
        }

        textarea.form-control {
            resize: vertical;
        }

        .btn-submit {
            background: linear-gradient(135deg, #38bdf8 0%, #60a5fa 100%);
            border: none;
            color: #ffffff;
            font-weight: 600;
            border-radius: 0.75rem;
            padding: 0.65rem 1.25rem;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.35);
            transition: all 0.25s ease;
            width: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(56, 189, 248, 0.5);
            color: #ffffff;
        }

        /* Ticket cards */
        .ticket-card {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-left: 4px solid #38bdf8;
            border-radius: 0.9rem;
            padding: 1rem 1.25rem;
            margin-bottom: 0.85rem;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .ticket-card:hover {
            transform: translateX(4px);
            border-color: rgba(56, 189, 248, 0.5);
        }

        .ticket-card h5 {
            color: #7dd3fc;
            font-size: 0.95rem;
            margin-bottom: 0.35rem;
        }

        .ticket-card p {
            color: #cbd5e1;
            font-size: 0.85rem;
            margin-bottom: 0.35rem;
        }

        .ticket-card small {
            color: #6b7280;
            font-size: 0.75rem;
        }

        .ticket-admin-reply {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.82rem;
            color: #94a3b8;
        }

        .ticket-admin-reply b {
            color: #38bdf8;
        }

        .badge-resolved {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-open {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 999px;
            padding: 3px 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #6b7280;
        }

        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            color: #374151;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3);
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.6rem;
            }
        }
    </style>
    <script src="config.js"></script>
</head>

<body>
    <!-- Navigation – exact same as customer-dashboard.html -->
    <nav class="navbar"
        style="background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid rgba(56, 189, 248, 0.2); backdrop-filter: blur(16px); padding: 0.75rem 0; position: sticky; top: 0; z-index: 1000; margin-bottom: 2rem;">
        <div class="container"
            style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px;">
            <a class="navbar-brand" href="customer-dashboard.html"
                style="font-weight: 700; font-size: 1.5rem; background: linear-gradient(135deg, #38bdf8, #3b82f6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none;">
                <i class="fas fa-tools me-2"></i>WorkConnect
            </a>

            <div style="display: flex; align-items: center; gap: 1.5rem;">
                <a href="customer-dashboard.html"
                    style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;"
                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">Dashboard</a>
                <a href="customer-orders.html"
                    style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;"
                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">My Orders</a>
                <a href="customer-payments.html"
                    style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: color 0.3s;"
                    onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">Payments</a>
                <a href="customer-help.html"
                    style="color: #fff; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: color 0.3s;">Help</a>

                <div class="nav-notifications">
                    <button type="button" id="customerNotifBtn"
                        style="background: none; border: none; color: #cbd5e1; position: relative; cursor: pointer; font-size: 1rem;">
                        <i class="fas fa-bell"></i>
                        <span id="customerNotifCount"
                            style="display: none; position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; border-radius: 50%; padding: 2px 5px; font-size: 0.65rem; font-weight: bold;">0</span>
                    </button>
                    <div id="customerNotifDropdown" class="notifications-dropdown">
                        <h6>Notifications</h6>
                        <div id="customerNotifList" style="max-height: 300px; overflow-y: auto;"></div>
                    </div>
                </div>

                <div class="dropdown">
                    <a href="customer-profile.html"
                        style="color: #cbd5e1; text-decoration: none; font-weight: 500; font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem;"
                        onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#cbd5e1'">
                        <i class="fas fa-user-circle" style="font-size: 1.2rem;"></i>
                        <span id="navUserName">Profile</span>
                    </a>
                </div>

                <button class="btn btn-outline-danger btn-sm" onclick="logout()" style="border-radius: 8px;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container py-2">
        <header class="page-header">
            <p class="section-label"><i class="fas fa-headset me-1"></i>Support</p>
            <h1 class="page-title">Help Center</h1>
            <p class="page-subtitle">Submit a support ticket or view your ticket history below.</p>
        </header>

        <div class="row g-4">
            <!-- Submit Ticket -->
            <div class="col-md-5">
                <div class="glass-card">
                    <h3><i class="fas fa-paper-plane me-2" style="color:#38bdf8;"></i>Submit a Ticket</h3>
                    <form id="helpForm">
                        <div class="mb-3">
                            <label class="form-label">Subject</label>
                            <input type="text" id="subject" class="form-control"
                                placeholder="What do you need help with?" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Message</label>
                            <textarea id="message" class="form-control" rows="5"
                                placeholder="Describe your issue in detail..." required></textarea>
                        </div>
                        <button type="submit" class="btn-submit">
                            <i class="fas fa-paper-plane me-2"></i>Submit Support Ticket
                        </button>
                    </form>
                </div>
            </div>

            <!-- Ticket History -->
            <div class="col-md-7">
                <div class="glass-card">
                    <h3><i class="fas fa-history me-2" style="color:#38bdf8;"></i>My Ticket History</h3>
                    <div id="ticketList">
                        <div class="empty-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p class="mt-2">Loading tickets...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const currentUser = JSON.parse(localStorage.getItem('user'));

        document.addEventListener('DOMContentLoaded', () => {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            // Set nav username
            const navUserName = document.getElementById('navUserName');
            if (navUserName) navUserName.textContent = (currentUser.name || currentUser.username).split(' ')[0];

            loadTickets();
            loadNotifications();
            setInterval(loadNotifications, 10000);
            initCustomerNotifToggle();
        });

        /* ── Notifications ── */
        async function loadNotifications() {
            if (!currentUser) return;
            try {
                const res = await fetch(getApiUrl(`/api/notifications/${currentUser.id}`));
                if (res.ok) {
                    const notifications = await res.json();
                    renderNotifications(notifications);
                }
            } catch (e) {
                console.error('Error loading notifications', e);
            }
        }

        function renderNotifications(notifications) {
            const listEl = document.getElementById('customerNotifList');
            const countEl = document.getElementById('customerNotifCount');
            if (!listEl || !countEl) return;

            const unread = notifications.filter(n => !n.read);
            countEl.textContent = unread.length > 9 ? '9+' : unread.length;
            countEl.style.display = unread.length > 0 ? 'inline-block' : 'none';

            if (notifications.length === 0) {
                listEl.innerHTML = '<div class="p-3 text-center" style="color:#6b7280;font-size:0.85rem;">No notifications</div>';
                return;
            }

            listEl.innerHTML = notifications.map(n => `
                <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markAsRead('${n._id || n.id}', '${n.link}')">
                    <div class="notif-title" style="${n.read ? '' : 'font-weight:700;'}">${n.message}</div>
                    <div class="notif-meta">${new Date(n.createdAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                </div>
            `).join('');
        }

        async function markAsRead(notifId, link) {
            try {
                await fetch(getApiUrl(`/api/notifications/${notifId}/read`), { method: 'PUT' });
                if (link && link !== 'null' && link !== 'undefined') {
                    window.location.href = link;
                } else {
                    loadNotifications();
                }
            } catch (e) {
                console.error('Error marking as read', e);
            }
        }

        function initCustomerNotifToggle() {
            const btn = document.getElementById('customerNotifBtn');
            const dropdown = document.getElementById('customerNotifDropdown');
            if (!btn || !dropdown) return;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });
            document.addEventListener('click', () => {
                dropdown.classList.remove('show');
            });
        }

        /* ── Tickets ── */
        async function loadTickets() {
            if (!currentUser) return;
            try {
                const res = await fetch(getApiUrl(`/api/support/tickets/${currentUser.id}`));
                const tickets = await res.json();
                const list = document.getElementById('ticketList');

                if (!tickets.length) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-ticket-alt"></i>
                            <p class="mt-2">No tickets submitted yet.</p>
                        </div>`;
                    return;
                }

                list.innerHTML = '';
                tickets.slice().reverse().forEach(t => {
                    const badgeClass = t.status === 'resolved' ? 'badge-resolved' : 'badge-open';
                    list.innerHTML += `
                        <div class="ticket-card">
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <h5>${t.subject}</h5>
                                <span class="${badgeClass}">${t.status}</span>
                            </div>
                            <p>${t.message}</p>
                            ${t.adminReply ? `<div class="ticket-admin-reply"><b>Admin:</b> ${t.adminReply}</div>` : ''}
                            <small><i class="fas fa-clock me-1"></i>${new Date(t.createdAt).toLocaleString()}</small>
                        </div>`;
                });
            } catch (e) {
                document.getElementById('ticketList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p class="mt-2">Failed to load tickets.</p>
                    </div>`;
            }
        }

        /* ── Submit form ── */
        document.getElementById('helpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Submitting...';

            const ticket = {
                userId: currentUser.id,
                username: currentUser.username,
                role: currentUser.role,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            try {
                const res = await fetch(getApiUrl('/api/support/tickets'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ticket)
                });

                if (res.ok) {
                    document.getElementById('helpForm').reset();
                    loadTickets();
                    btn.innerHTML = '<i class="fas fa-check me-2"></i>Ticket Submitted!';
                    setTimeout(() => {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Submit Support Ticket';
                    }, 2500);
                } else {
                    throw new Error('Failed');
                }
            } catch {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Submit Support Ticket';
                alert('Failed to submit ticket. Please try again.');
            }
        });

        function logout() {
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
