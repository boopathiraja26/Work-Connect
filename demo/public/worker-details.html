<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Details</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .worker-details {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .back-btn {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            text-decoration: none;
            display: inline-block;
        }
        
        .back-btn:hover {
            background: #5a6fd8;
        }
        
        .worker-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .worker-header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }
        
        .worker-header p {
            margin: 0;
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .worker-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .main-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }
        
        .sidebar-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }
        
        .section-title {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
            font-size: 1.3rem;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .info-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        
        .info-value {
            color: #666;
            font-size: 1rem;
        }
        
        .skills-container {
            margin-bottom: 25px;
        }
        
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .skill-tag {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .availability-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .available {
            background: #d4edda;
            color: #155724;
        }
        
        .busy {
            background: #fff3cd;
            color: #856404;
        }
        
        .unavailable {
            background: #f8d7da;
            color: #721c24;
        }
        
        .rating-section {
            margin-bottom: 25px;
        }
        
        .rating-display {
            font-size: 2rem;
            color: #f39c12;
            margin-bottom: 10px;
        }
        
        .reviews-section {
            margin-top: 30px;
        }
        
        .review-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .review-rating {
            color: #f39c12;
            font-weight: bold;
        }
        
        .review-date {
            color: #888;
            font-size: 0.9rem;
        }
        
        .review-comment {
            color: #666;
            font-style: italic;
        }
        
        .hire-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .hire-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }
        
        .hire-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .contact-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .contact-icon {
            margin-right: 10px;
            font-size: 1.2rem;
        }
        
        .location-map {
            height: 200px;
            border-radius: 10px;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            .worker-content {
                grid-template-columns: 1fr;
            }
            
            .worker-header h1 {
                font-size: 2rem;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="worker-details">
            <a href="customer-dashboard.html" class="back-btn">← Back to Dashboard</a>
            
            <div class="worker-header">
                <h1 id="workerName">Worker Details</h1>
                <p id="workerRole">Professional Worker</p>
            </div>
            
            <div class="worker-content">
                <div class="main-section">
                    <div class="availability-badge" id="availabilityBadge">Available</div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">Experience</div>
                            <div class="info-value" id="experience">N/A</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Hourly Rate</div>
                            <div class="info-value" id="hourlyRate">N/A</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Phone</div>
                            <div class="info-value" id="phone">N/A</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">Email</div>
                            <div class="info-value" id="email">N/A</div>
                        </div>
                    </div>
                    
                    <div class="skills-container">
                        <h3 class="section-title">Skills</h3>
                        <div class="skills-list" id="skillsList">
                            <!-- Skills will be populated here -->
                        </div>
                    </div>
                    
                    <div class="rating-section">
                        <h3 class="section-title">Rating & Reviews</h3>
                        <div class="rating-display" id="ratingDisplay">No ratings yet</div>
                        <div id="reviewsList">
                            <!-- Reviews will be populated here -->
                        </div>
                    </div>
                    
                    <div class="reviews-section">
                        <h3 class="section-title">About</h3>
                        <p id="description">No description available.</p>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="section-title">Contact & Location</h3>
                    
                    <div class="contact-info">
                        <div class="contact-item">
                            <span class="contact-icon">📞</span>
                            <span id="contactPhone">N/A</span>
                        </div>
                        <div class="contact-item">
                            <span class="contact-icon">✉️</span>
                            <span id="contactEmail">N/A</span>
                        </div>
                        <div class="contact-item" id="addressItem" style="display: none;">
                            <span class="contact-icon">🏠</span>
                            <span id="contactAddress">N/A</span>
                        </div>
                        <div class="contact-item" id="locationItem" style="display: none;">
                            <span class="contact-icon">📍</span>
                            <a id="locationLink" href="#" target="_blank" style="color: #667eea; text-decoration: none;">
                                View on Map
                            </a>
                        </div>
                    </div>
                    
                    <div id="mapContainer" style="display: none;">
                        <h4>Location</h4>
                        <div id="map" class="location-map"></div>
                    </div>
                    
                    <button class="hire-btn" id="hireBtn" onclick="openOrderModal()">
                        Hire This Worker
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Order Modal -->
    <div id="orderModal" class="modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5);">
        <div class="modal-content" style="background-color: white; margin: 5% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 class="modal-title" style="font-size: 1.5rem; font-weight: 600; color: #333;">Place Order</h2>
                <span class="close" onclick="closeModal()" style="color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
            </div>
            <form class="order-form" id="orderForm" style="display: grid; gap: 15px;">
                <div class="form-group">
                    <label for="serviceType">Service Type</label>
                    <input type="text" id="serviceType" required placeholder="e.g., Plumbing repair">
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" rows="3" required placeholder="Describe the work needed"></textarea>
                </div>
                <div class="form-group">
                    <label for="duration">Duration (hours)</label>
                    <input type="number" id="duration" min="1" required placeholder="Estimated hours">
                </div>
                <div class="form-group">
                    <label for="totalAmount">Total Amount (₹)</label>
                    <input type="number" id="totalAmount" min="0" step="50" required placeholder="Total cost">
                </div>
                <button type="submit" class="submit-order-btn" style="background: linear-gradient(135deg, #28a745 0%, #20c997 100%); color: white; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer;">Place Order</button>
            </form>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg" async defer></script>
    <script>
        let currentUser = null;
        let currentWorker = null;
        let map = null;
        let marker = null;

        // Check if user is logged in and is a customer
        document.addEventListener('DOMContentLoaded', function() {
            let user;
            try {
                const userStr = localStorage.getItem('user');
                user = userStr ? JSON.parse(userStr) : null;
            } catch (e) {
                user = null;
            }
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            
            if (user.role !== 'customer') {
                window.location.href = 'dashboard.html';
                return;
            }
            
            currentUser = user;
            loadWorkerDetails();
        });
        
        async function loadWorkerDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const workerId = urlParams.get('id');
            
            if (!workerId) {
                alert('Worker ID not provided');
                window.location.href = 'customer-dashboard.html';
                return;
            }
            
            try {
                const response = await fetch(`/api/worker/${workerId}`);
                if (response.ok) {
                    currentWorker = await response.json();
                    displayWorkerDetails();
                    loadReviews(workerId);
                    initMap();
                } else {
                    alert('Worker not found');
                    window.location.href = 'customer-dashboard.html';
                }
            } catch (error) {
                console.error('Error loading worker details:', error);
                alert('Error loading worker details');
            }
        }
        
        function displayWorkerDetails() {
            // Header
            document.getElementById('workerName').textContent = currentWorker.name || currentWorker.username;
            
            // Availability
            const availabilityBadge = document.getElementById('availabilityBadge');
            availabilityBadge.textContent = currentWorker.availability || 'Available';
            availabilityBadge.className = `availability-badge ${(currentWorker.availability || 'Available').toLowerCase()}`;
            
            // Basic info
            document.getElementById('experience').textContent = currentWorker.experience ? `${currentWorker.experience} years` : 'N/A';
            document.getElementById('hourlyRate').textContent = currentWorker.hourlyRate ? `$${currentWorker.hourlyRate}/hour` : 'N/A';
            document.getElementById('phone').textContent = currentWorker.phone || 'N/A';
            document.getElementById('email').textContent = currentWorker.email || 'N/A';
            
            // Contact info
            document.getElementById('contactPhone').textContent = currentWorker.phone || 'N/A';
            document.getElementById('contactEmail').textContent = currentWorker.email || 'N/A';
            
            // Address
            if (currentWorker.address) {
                const address = `${currentWorker.address.street || ''} ${currentWorker.address.city || ''} ${currentWorker.address.state || ''} ${currentWorker.address.pincode || ''}`.trim();
                if (address) {
                    document.getElementById('contactAddress').textContent = address;
                    document.getElementById('addressItem').style.display = 'flex';
                }
            }
            
            // Location
            if (currentWorker.location && currentWorker.location.link) {
                document.getElementById('locationLink').href = currentWorker.location.link;
                document.getElementById('locationItem').style.display = 'flex';
                document.getElementById('mapContainer').style.display = 'block';
            }
            
            // Skills
            const skillsList = document.getElementById('skillsList');
            if (currentWorker.skills && currentWorker.skills.length > 0) {
                skillsList.innerHTML = currentWorker.skills.map(skill => 
                    `<span class="skill-tag">${skill}</span>`
                ).join('');
            } else {
                skillsList.innerHTML = '<p style="color: #666;">No skills listed</p>';
            }
            
            // Rating
            const ratingDisplay = document.getElementById('ratingDisplay');
            if (currentWorker.averageRating) {
                ratingDisplay.innerHTML = `⭐ ${currentWorker.averageRating} (${currentWorker.reviewsCount || 0} reviews)`;
            } else {
                ratingDisplay.innerHTML = 'No ratings yet';
            }
            
            // Description
            document.getElementById('description').textContent = currentWorker.description || 'No description available.';
            
            // Hire button
            const hireBtn = document.getElementById('hireBtn');
            if (currentWorker.availability === 'Unavailable') {
                hireBtn.textContent = 'Unavailable';
                hireBtn.disabled = true;
            }
        }
        
        async function loadReviews(workerId) {
            try {
                const response = await fetch(`/api/worker/${workerId}/reviews`);
                const reviews = await response.json();
                const reviewsList = document.getElementById('reviewsList');
                
                if (!reviews || reviews.length === 0) {
                    reviewsList.innerHTML = '<p style="color: #888;">No reviews yet.</p>';
                    return;
                }
                
                reviewsList.innerHTML = reviews.map(review => `
                    <div class="review-item">
                        <div class="review-header">
                            <span class="review-rating">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</span>
                            <span class="review-date">${new Date(review.createdAt).toLocaleDateString()}</span>
                        </div>
                        <div class="review-comment">${review.comment || 'No comment provided'}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading reviews:', error);
                document.getElementById('reviewsList').innerHTML = '<p style="color: #888;">Error loading reviews.</p>';
            }
        }
        
        function initMap() {
            if (!currentWorker.location || !currentWorker.location.latitude || !currentWorker.location.longitude) {
                return;
            }
            
            const lat = parseFloat(currentWorker.location.latitude);
            const lng = parseFloat(currentWorker.location.longitude);
            
            if (isNaN(lat) || isNaN(lng)) {
                return;
            }
            
            const mapOptions = {
                center: { lat, lng },
                zoom: 15
            };
            
            map = new google.maps.Map(document.getElementById('map'), mapOptions);
            marker = new google.maps.Marker({
                position: { lat, lng },
                map: map,
                title: currentWorker.name || currentWorker.username
            });
        }
        
        function openOrderModal() {
            document.getElementById('orderModal').style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
            document.getElementById('orderForm').reset();
        }
        
        // Handle order form submission
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!currentWorker) {
                alert('No worker selected');
                return;
            }
            
            const formData = {
                customerId: currentUser.id,
                workerId: currentWorker.id,
                serviceType: document.getElementById('serviceType').value,
                description: document.getElementById('description').value,
                duration: document.getElementById('duration').value,
                totalAmount: document.getElementById('totalAmount').value
            };
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    alert('Order placed successfully!');
                    closeModal();
                    window.location.href = 'customer-dashboard.html';
                } else {
                    const error = await response.json();
                    alert('Error placing order: ' + error.message);
                }
            } catch (error) {
                console.error('Error placing order:', error);
                alert('Error placing order');
            }
        });
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
