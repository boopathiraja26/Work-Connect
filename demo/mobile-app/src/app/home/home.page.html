<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>
      WorkConnect
    </ion-title>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="person-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">WorkConnect</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-searchbar placeholder="Search workers..."></ion-searchbar>

  <ion-list>
    <ion-list-header>
      <ion-label>Available Workers</ion-label>
    </ion-list-header>

    <ion-item-sliding *ngFor="let worker of workers">
      <ion-item button>
        <ion-avatar slot="start">
          <div class="avatar-fallback">{{ worker.name?.[0]?.toUpperCase() }}</div>
        </ion-avatar>
        <ion-label>
          <h2>{{ worker.name }}</h2>
          <p>{{ worker.role | titlecase }} • {{ worker.hourlyRate ? '₹' + worker.hourlyRate + '/hr' : 'Rate on request'
            }}</p>
          <ion-badge color="success" *ngIf="worker.approved">Verified</ion-badge>
        </ion-label>
        <ion-note slot="end" color="primary">View</ion-note>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="primary">
          <ion-icon name="call-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div *ngIf="workers.length === 0" class="ion-padding ion-text-center">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Loading workforce...</p>
  </div>
</ion-content>
